<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Garden Planner{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <a href="{{ url_for('index') }}" class="nav-brand">Garden Planner</a>
    <ul>
      <li><a href="{{ url_for('gardens') }}">Gardens</a></li>
      <li><a href="{{ url_for('beds') }}">Beds</a></li>
      <li><a href="{{ url_for('plants') }}">Plants</a></li>
      <li><a href="{{ url_for('tasks') }}">Tasks</a></li>
    </ul>
  </nav>
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
