<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Garden Planner{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <a href="{{ url_for('index') }}" class="nav-brand">Garden Planner</a>
    <ul>
      <li><a href="{{ url_for('gardens') }}">Gardens</a></li>
      <li><a href="{{ url_for('planner_index') }}">Planner</a></li>
      <li><a href="{{ url_for('beds') }}">Beds</a></li>
      <li><a href="{{ url_for('plants') }}">Plants</a></li>
      <li><a href="{{ url_for('tasks') }}">Tasks</a></li>
      <li><a href="{{ url_for('library') }}">Library</a></li>
    </ul>
  </nav>
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <footer class="app-footer">
    <div class="app-footer__inner">
      <span class="app-footer__brand">🌱 Garden Planner</span>
      <nav class="app-footer__links">
        <a href="{{ url_for('library') }}">Plant Library</a>
        <a href="{{ url_for('gardens') }}">My Gardens</a>
        <a href="https://en.wikipedia.org/wiki/Hardiness_zone" target="_blank" rel="noopener">USDA Zones ↗</a>
        <a href="https://www.almanac.com/gardening/planting-calendar" target="_blank" rel="noopener">Planting Calendar ↗</a>
        <a href="https://open-meteo.com" target="_blank" rel="noopener">Weather via Open-Meteo ↗</a>
      </nav>
    </div>
  </footer>
</body>
</html>
